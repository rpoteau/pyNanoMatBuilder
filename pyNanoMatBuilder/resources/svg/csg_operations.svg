  <title
     id="title1">CSG operations on nanoparticles: union, cut, intersect, inlay</title>
  <desc
     id="desc1">Four constructive solid geometry operations illustrated with a silver cube (A) and gold sphere (B): union merges both, cut removes B from A, intersect keeps only the overlap, inlay embeds B inside A.</desc>
